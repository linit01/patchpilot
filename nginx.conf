# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — Nginx config template
#
# $NGINX_BACKEND_HOST is substituted at container startup via envsubst.
#   Docker Compose : NGINX_BACKEND_HOST=backend           (compose service name)
#   Kubernetes     : NGINX_BACKEND_HOST=patchpilot-backend (k8s Service name)
#
# The Dockerfile.frontend entrypoint calls:
#   envsubst '$NGINX_BACKEND_HOST' < /etc/nginx/conf.d/default.conf.tmpl \
#       > /etc/nginx/conf.d/default.conf
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index login.html;

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /login.html;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://${NGINX_BACKEND_HOST}:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket (live patch progress) ──────────────────────────────────────
    location /ws/ {
        proxy_pass            http://${NGINX_BACKEND_HOST}:8000/ws/;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade    $http_upgrade;
        proxy_set_header      Connection "upgrade";
        proxy_set_header      Host       $host;
        proxy_set_header      X-Real-IP  $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    86400;
    }

    # ── Health endpoint ───────────────────────────────────────────────────────
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
