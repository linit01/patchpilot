version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: patchpilot-db
    environment:
      - POSTGRES_USER=patchpilot
      - POSTGRES_PASSWORD=patchpilot
      - POSTGRES_DB=patchpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database-schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patchpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: patchpilot-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./ansible:/ansible
      # - ~/.ssh:/root/.ssh:ro
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://patchpilot:patchpilot@postgres:5432/patchpilot
      - ANSIBLE_PLAYBOOK_PATH=/ansible/check-os-updates.yml
      - ANSIBLE_INVENTORY_PATH=/ansible/hosts
      - ANSIBLE_HOST_KEY_CHECKING=False
      - ANSIBLE_SSH_ARGS=-o ControlMaster=no -o ControlPersist=no -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: patchpilot-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
