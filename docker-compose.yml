# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — Docker Compose  (LAN deployment, HTTP)
#
# Access at http://<host-ip>:8080 or http://<hostname>:8080
#
# HTTPS: place any reverse proxy in front pointing to port 8080
#        (Nginx Proxy Manager, Traefik, Caddy, Cloudflare Tunnel)
#
# Backup/Restore additions are marked with ✚
#
# NFS BACKUPS: By default, backups use a local named Docker volume.
# To use NFS, replace the `backups:` volume entry at the bottom of this
# file with the NFS variant shown in the Setup Wizard "Done" screen,
# or configure it manually:
#
#   backups:
#     driver: local
#     driver_opts:
#       type: nfs
#       o: addr=<NFS_SERVER_IP>,rw,nfsvers=4
#       device: ":<NFS_SHARE_PATH>"
#
# The NFS server and share are also saved to the settings table during
# first-run setup so you can retrieve the exact snippet from Settings →
# Backup & Restore at any time.
#
# DEVELOPER MODE: To build images from local source instead of pulling
# from Docker Hub, use the developer override:
#   docker compose -f docker-compose.yml -f docker-compose.developer.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: patchpilot-postgres-1      # ✚ explicit name (backup module uses it)
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-patchpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchpilot}
      POSTGRES_DB:       ${POSTGRES_DB:-patchpilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patchpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - patchpilot

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    image: linit01/patchpilot:backend-0.16.4-alpha
    # build: .    # uncomment when using docker-compose.developer.yml
    container_name: patchpilot-backend-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_USER:     ${POSTGRES_USER:-patchpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchpilot}
      POSTGRES_DB:       ${POSTGRES_DB:-patchpilot}
      DATABASE_URL:      postgresql://${POSTGRES_USER:-patchpilot}:${POSTGRES_PASSWORD:-patchpilot}@postgres:5432/${POSTGRES_DB:-patchpilot}

      PATCHPILOT_ENCRYPTION_KEY: ${PATCHPILOT_ENCRYPTION_KEY}
      AUTO_REFRESH_INTERVAL:     ${AUTO_REFRESH_INTERVAL:-300}
      DEFAULT_SSH_USER:          ${DEFAULT_SSH_USER:-root}
      DEFAULT_SSH_PORT:          ${DEFAULT_SSH_PORT:-22}

      # Set to your actual URL if running behind a reverse proxy for HTTPS
      APP_BASE_URL:    ${APP_BASE_URL:-http://localhost:8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

      # ✚ Backup settings
      BACKUP_DIR:              /backups
      BACKUP_RETAIN_COUNT:     ${BACKUP_RETAIN_COUNT:-10}
      MAX_BACKUP_SIZE_MB:      ${MAX_BACKUP_SIZE_MB:-500}
      POSTGRES_CONTAINER_NAME: patchpilot-postgres-1
      ANSIBLE_DIR:             /ansible

      # Tells the uninstaller which deployment type this is
      PATCHPILOT_INSTALL_MODE: docker

    volumes:
      - ./ansible:/ansible
      - backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock:ro  # required — enables in-app uninstall
      - .:/install:rw  # mount install dir so restore can update .env encryption key

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/setup/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

    networks:
      - patchpilot

  # ── Frontend (Nginx) ────────────────────────────────────────────────────────
  frontend:
    image: linit01/patchpilot:frontend-0.16.4-alpha
    # frontend files are baked into the image; nginx.conf is rendered at startup
    # via envsubst so the same image works for Docker Compose and Kubernetes.
    # use docker-compose.developer.yml to override with local source mounts
    container_name: patchpilot-frontend-1
    restart: unless-stopped
    environment:
      NGINX_BACKEND_HOST: backend    # Docker Compose service name
    ports:
      - "0.0.0.0:8080:80"    # HTTP — accessible from any LAN device
    depends_on:
      - backend
    networks:
      - patchpilot

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  backups:         # ✚ named volume for backup archives

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  patchpilot:
    driver: bridge
