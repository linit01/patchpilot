name: Build and Push Docker Images

# ─────────────────────────────────────────────────────────────────────────────
# Triggered on semver tag push (e.g. v0.9.8, v1.0.0)
# Builds linux/amd64 + linux/arm64 for BOTH backend and frontend images
# and pushes multi-arch manifest lists to Docker Hub.
#
# This is the CI equivalent of:  ./k8s/build-push.sh --release
#
# The local build-push.sh script remains available for dev builds.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

env:
  DOCKERHUB_REPO: linit01/patchpilot
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Cross-check against VERSION file
          FILE_VERSION="$(cat VERSION 2>/dev/null | tr -d '[:space:]')"
          if [[ -n "$FILE_VERSION" && "$FILE_VERSION" != "$VERSION"* ]]; then
            echo "::warning::Tag version ($VERSION) differs from VERSION file ($FILE_VERSION)"
          fi

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend image ─────────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:backend-${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_REPO }}:backend-latest
          build-args: |
            PATCHPILOT_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── Frontend image ────────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:frontend-${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_REPO }}:frontend-latest
          build-args: |
            PATCHPILOT_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Print image summary
        run: |
          echo "## PatchPilot Release Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend  | \`${{ env.DOCKERHUB_REPO }}:backend-${{ steps.version.outputs.version }}\`, \`:backend-latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | \`${{ env.DOCKERHUB_REPO }}:frontend-${{ steps.version.outputs.version }}\`, \`:frontend-latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Platforms: \`${{ env.PLATFORMS }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}
          short-description: "PatchPilot — Kubernetes & Linux Patch Management"
