name: PatchPilot
options:
  bundleIdPrefix: com.patchpilot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_KEY_CFBundleDisplayName: PatchPilot
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"

targets:
  PatchPilot:
    type: application
    platform: iOS
    sources:
      - PatchPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patchpilot.ios
        INFOPLIST_FILE: PatchPilot/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
