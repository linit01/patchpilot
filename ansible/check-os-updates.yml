---
- hosts: all
  gather_facts: yes
  serial: 1
  vars:
    ansible_python_interpreter: auto_silent
  tasks:
    # Emit structured host info for PatchPilot parser (OS, IP, Family)
    - name: Emit host info
      debug:
        msg: "HOSTINFO: {{ inventory_hostname }} | IP: {{ ansible_default_ipv4.address | default('N/A') }} | OS: {{ ansible_distribution | default('Unknown') }} | Family: {{ ansible_os_family | default('Unknown') }}"

    # Linux update checks
    - name: Refresh apt cache (Debian/Ubuntu)
      shell: apt-get update -qq 2>/dev/null
      become: yes
      when: ansible_facts['os_family'] == "Debian"
      changed_when: false
      failed_when: false
      ignore_errors: true

    # Include phased updates in the list so dashboard reflects what *can* be installed
    - name: Check for updates (Debian/Ubuntu)
      shell: APT_GET_ALWAYS_INCLUDE_PHASED_UPDATES=1 apt list --upgradable 2>/dev/null | tail -n +2
      register: apt_updates
      when: ansible_facts['os_family'] == "Debian"
      changed_when: false

    # macOS update checks
    - name: Check for Homebrew updates (macOS)
      shell: /opt/homebrew/bin/brew outdated
      register: brew_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false

    - name: Check for macOS system updates
      shell: /usr/sbin/softwareupdate -l
      register: macos_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false

    - name: Check for App Store updates (requires mas)
      shell: /opt/homebrew/bin/mas outdated
      register: mas_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false

    # Emit individual package details so PatchPilot can populate the packages table
    - name: Emit Debian package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ apt_updates.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Debian" and apt_updates.stdout_lines is defined and apt_updates.stdout_lines | length > 0

    - name: Emit Homebrew package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ brew_updates.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Darwin" and brew_updates.stdout_lines is defined and brew_updates.stdout_lines | length > 0

    - name: Emit macOS system update details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ macos_updates.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Darwin" and macos_updates.stdout_lines is defined and macos_updates.stdout_lines | length > 0

    - name: Emit App Store package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ mas_updates.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Darwin" and mas_updates.stdout_lines is defined and mas_updates.stdout_lines | length > 0

    # Show status
    - name: Show update status
      debug:
        msg: "{{ inventory_hostname }}: {% if apt_updates.stdout_lines is defined and apt_updates.stdout_lines | length > 0 %}{{ apt_updates.stdout_lines | length }} apt updates available{% elif brew_updates.stdout_lines is defined and brew_updates.stdout_lines | length > 0 %}{{ brew_updates.stdout_lines | length }} brew updates available{% elif macos_updates.stdout is defined and 'No new software available' not in macos_updates.stdout %}macOS system updates available{% elif mas_updates.stdout_lines is defined and mas_updates.stdout_lines | length > 0 %}{{ mas_updates.stdout_lines | length }} App Store updates available{% else %}Up to date{% endif %}"
      when: apt_updates.stdout_lines is defined or brew_updates.stdout_lines is defined or macos_updates.stdout is defined or mas_updates.stdout_lines is defined

    # Apply updates
    - name: Starting updates on host
      debug:
        msg: "=== Applying updates to {{ inventory_hostname }} ==="
      tags: ['never', 'apply-updates']

    # Use shell instead of apt module so we can pass --allow-phased-updates.
    # The apt module has no parameter for this flag — without it, Ubuntu silently
    # defers phased packages (changed: false) even when the dashboard shows them pending.
    - name: Apply updates (Debian/Ubuntu)
      shell: |
        DEBIAN_FRONTEND=noninteractive apt-get -y \
          -o APT::Get::Always-Include-Phased-Updates=true \
          -o Dpkg::Options::="--force-confdef" \
          -o Dpkg::Options::="--force-confold" \
          dist-upgrade
      become: yes
      when: ansible_facts['os_family'] == "Debian"
      register: apt_upgrade_result
      changed_when: "'0 upgraded' not in apt_upgrade_result.stdout"
      tags: ['never', 'apply-updates']

    - name: Apply Homebrew updates (macOS)
      shell: HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_EMOJI=1 /opt/homebrew/bin/brew upgrade
      when: ansible_facts['os_family'] == "Darwin"
      register: brew_upgrade_result
      failed_when: false
      tags: ['never', 'apply-updates']

    - name: Apply macOS system updates
      shell: /usr/sbin/softwareupdate -i -a
      when: ansible_facts['os_family'] == "Darwin"
      register: macos_upgrade_result
      tags: ['never', 'apply-updates']

    - name: Apply App Store updates
      shell: /opt/homebrew/bin/mas upgrade
      when: ansible_facts['os_family'] == "Darwin"
      register: mas_upgrade_result
      failed_when: false
      tags: ['never', 'apply-updates']

    # Reboot handling
    - name: Check if reboot required (Linux)
      stat:
        path: /var/run/reboot-required
      become: yes
      register: reboot_required
      when: ansible_facts['os_family'] == "Debian"
      tags: ['never', 'apply-updates']

    - name: Reboot if needed (Linux)
      reboot:
        msg: "Rebooting for system updates"
        reboot_timeout: 300
      become: yes
      when: ansible_facts['os_family'] == "Debian" and reboot_required.stat.exists
      tags: ['never', 'apply-updates', 'reboot']
