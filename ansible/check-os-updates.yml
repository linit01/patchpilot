---
- hosts: all
  gather_facts: no
  ignore_unreachable: true
  vars:
    ansible_python_interpreter: auto_silent

    # macos_system_updates_enabled: must be explicitly true to install macOS
    # system updates via CLI.  softwareupdate over SSH is unreliable on newer
    # macOS — the daemon often hands off to the GUI notification manager and
    # the CLI hangs indefinitely.  Default false = detect & report only.
    macos_system_updates_enabled: "{{ lookup('env', 'MACOS_SYSTEM_UPDATES_ENABLED') | default('false', true) | lower == 'true' }}"

    # Comma-separated softwareupdate label prefixes to skip (prefix match).
    # e.g. "Command Line Tools for Xcode" excludes any version of CLT.
    macos_system_excluded_labels: "{{ lookup('env', 'MACOS_SYSTEM_EXCLUDED_LABELS') | default('', true) }}"

    # mas_enabled: must be explicitly true to run App Store updates.
    # mas in headless SSH requires an active GUI login + App Store auth on
    # the target Mac. Confirm `mas outdated` works interactively first.
    mas_enabled: "{{ lookup('env', 'MAS_ENABLED') | default('false', true) | lower == 'true' }}"

    # Comma-separated App Store IDs to always skip (Xcode = 497799835).
    mas_excluded_ids: "{{ lookup('env', 'MAS_EXCLUDED_IDS') | default('497799835', true) }}"

    # Per-app hard timeout in seconds on the REMOTE HOST.
    # Uses `timeout` or `gtimeout` (coreutils) to hard-kill hung mas processes.
    mas_per_app_timeout: "{{ lookup('env', 'MAS_PER_APP_TIMEOUT') | default('600', true) | int }}"

    # Ansible async ceiling for the entire mas upgrade task.
    mas_timeout_seconds: "{{ lookup('env', 'MAS_TIMEOUT_SECONDS') | default('7200', true) | int }}"

    # Comma-separated winget package IDs to skip (Microsoft.Edge by default).
    winget_excluded_ids: "{{ lookup('env', 'WINGET_EXCLUDED_IDS') | default('Microsoft.Edge', true) }}"

    # Windows Update (PSWindowsUpdate) — must be explicitly enabled.
    winupdate_enabled: "{{ lookup('env', 'WINUPDATE_ENABLED') | default('false', true) | lower == 'true' }}"

  tasks:
    # ── Explicit fact gathering ────────────────────────────────────────────────
    # gather_facts: no at the play level prevents Ansible from aborting the
    # entire serial run when a single host is unreachable or gather_facts
    # fails.  Instead we call setup explicitly and register the result so
    # we can skip remaining tasks for that host gracefully while continuing
    # to the next host in the inventory.
    - name: Gather facts (explicit — allows failures without aborting play)
      setup:
        gather_subset:
          - '!all'
          - 'distribution'
          - 'network'
      register: setup_result
      ignore_errors: true
      ignore_unreachable: true
      tags: always

    - name: Set host reachability fact
      set_fact:
        host_reachable: "{{ setup_result is not failed and setup_result is not unreachable }}"
      ignore_errors: true
      tags: always

    - name: Emit unreachable status for parser
      debug:
        msg: "HOSTSTATUS: {{ inventory_hostname }} | unreachable"
      when: not (host_reachable | default(false))
      tags: always

    - name: Skip remaining tasks for unreachable host
      meta: end_host
      when: not (host_reachable | default(false))
      tags: always

    # ── Host info ──────────────────────────────────────────────────────────────
    - name: Emit host info
      debug:
        msg: "HOSTINFO: {{ inventory_hostname }} | IP: {{ ansible_default_ipv4.address | default('N/A') }} | OS: {{ ansible_distribution | default('Unknown') }} | Family: {{ ansible_os_family | default('Unknown') }}"

    # ── Linux ──────────────────────────────────────────────────────────────────
    - name: Refresh apt cache (Debian/Ubuntu)
      shell: apt-get update -qq 2>/dev/null
      become: yes
      when: ansible_facts['os_family'] == "Debian"
      changed_when: false
      failed_when: false
      ignore_errors: true

    - name: Check for updates (Debian/Ubuntu)
      shell: APT_GET_ALWAYS_INCLUDE_PHASED_UPDATES=1 apt list --upgradable 2>/dev/null | tail -n +2
      register: apt_updates
      when: ansible_facts['os_family'] == "Debian"
      changed_when: false

    # ── macOS: locate tools ────────────────────────────────────────────────────
    - name: Stat mas binary candidates (macOS)
      # stat module does a direct filesystem lookup — no shell, no PATH, no
      # interpretation. This is the only reliable way to check file existence
      # in a non-interactive Ansible SSH session.
      stat:
        path: "{{ item }}"
      register: mas_stat_results
      loop:
        - /opt/homebrew/bin/mas
        - /usr/local/bin/mas
        - /usr/bin/mas
      when: ansible_facts['os_family'] == "Darwin"
      tags: always

    - name: Set mas_bin fact (macOS)
      set_fact:
        mas_bin_path: "{{ item.stat.path }}"
      loop: "{{ mas_stat_results.results | default([]) }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - item.stat is defined
        - item.stat.exists
        - item.stat.executable
      # Last match wins — first found is fine since we loop in preference order
      tags: always

    - name: Debug mas binary found (macOS)
      debug:
        msg: "mas binary: {{ mas_bin_path | default('NOT FOUND') }}"
      when: ansible_facts['os_family'] == "Darwin"
      tags: always

    # Detect timeout binary binary: macOS 12.3+ has /usr/bin/timeout natively.
    # Older macOS needs `brew install coreutils` which provides gtimeout.
    # If neither exists we fall back to running mas without a timeout wrapper
    # (still better than before — at least async/poll gives Ansible heartbeats).
    - name: Stat timeout binary candidates (macOS)
      stat:
        path: "{{ item }}"
      register: timeout_stat_results
      loop:
        - /usr/bin/timeout
        - /opt/homebrew/bin/gtimeout
        - /usr/local/bin/gtimeout
        - /opt/homebrew/bin/timeout
        - /usr/local/bin/timeout
      when: ansible_facts['os_family'] == "Darwin"
      tags: always

    - name: Set timeout_bin fact (macOS)
      set_fact:
        timeout_bin_path: "{{ item.stat.path }}"
      loop: "{{ timeout_stat_results.results | default([]) }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - item.stat is defined
        - item.stat.exists
        - item.stat.executable
      tags: always

    - name: Stat brew binary candidates (macOS)
      stat:
        path: "{{ item }}"
      register: brew_stat_results
      loop:
        - /opt/homebrew/bin/brew
        - /usr/local/bin/brew
        - /home/linuxbrew/.linuxbrew/bin/brew
      when: ansible_facts['os_family'] == "Darwin"
      tags: always

    - name: Set brew_bin fact (macOS)
      set_fact:
        brew_bin_path: "{{ item.stat.path }}"
      loop: "{{ brew_stat_results.results | default([]) }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - item.stat is defined
        - item.stat.exists
        - item.stat.executable
      tags: always

    - name: Warn if mas not installed (macOS)
      debug:
        msg: >-
          WARNING: mas (Mac App Store CLI) not found on {{ inventory_hostname }}.
          App Store updates will be skipped. Install: brew install mas
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_bin_path is defined
        - mas_bin_path | default('') == ""
      tags: always

    - name: Warn if mas disabled (macOS)
      debug:
        msg: >-
          INFO: App Store updates disabled on {{ inventory_hostname }} (mas_enabled=false).
          Enable in PatchPilot Settings → macOS → Enable mas Updates.
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_bin_path is defined
        - mas_bin_path | default('') != ""
        - not mas_enabled
      tags: always

    - name: Warn if no timeout binary (macOS)
      debug:
        msg: >-
          WARNING: No timeout binary found on {{ inventory_hostname }}.
          mas updates will run without a per-app hard timeout.
          Install GNU coreutils for safety: brew install coreutils
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_bin_path is defined
        - mas_bin_path | default('') != ""
        - mas_enabled | bool
        - timeout_bin_path is not defined or timeout_bin_path | default('') == ''
      tags: always

    # ── macOS checks ───────────────────────────────────────────────────────────
    - name: Check for Homebrew updates (macOS)
      shell: "{{ brew_bin_path }} outdated --verbose"
      register: brew_updates
      when:
        - ansible_facts['os_family'] == "Darwin"
        - brew_bin_path is defined
        - brew_bin_path | default('') != ""
      changed_when: false
      failed_when: false

    - name: Check for macOS system updates
      shell: |
        EXCLUDED="{{ macos_system_excluded_labels }}"
        RAW=$(/usr/sbin/softwareupdate -l 2>&1)

        if [ -z "$EXCLUDED" ]; then
          printf '%s\n' "$RAW"
          exit 0
        fi

        # Filter out excluded label blocks (prefix match, same logic as apply phase)
        filtered=""
        skip_block=false
        while IFS= read -r line; do
          if [[ "$line" =~ ^\*[[:space:]]Label:[[:space:]] ]]; then
            label="${line#\* Label: }"
            skip_block=false
            IFS=',' read -ra excl_arr <<< "$EXCLUDED"
            for excl in "${excl_arr[@]}"; do
              excl_trim="${excl#"${excl%%[![:space:]]*}"}"
              excl_trim="${excl_trim%"${excl_trim##*[![:space:]]}"}"
              if [[ "$label" == "$excl_trim"* ]]; then
                skip_block=true
                break
              fi
            done
          fi
          if ! $skip_block; then
            filtered="${filtered}${line}"$'\n'
          fi
        done <<< "$RAW"

        # If all labels were excluded, report no updates so status shows Up to date
        if ! echo "$filtered" | grep -q '^\* Label:'; then
          echo "No new software available."
        else
          printf '%s' "$filtered"
        fi
      register: macos_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false

    - name: Check for App Store updates (requires mas + mas_enabled)
      shell: "{{ mas_bin_path }} outdated"
      register: mas_updates
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_bin_path is defined
        - mas_bin_path | default('') != ""
        - mas_enabled | bool
      changed_when: false
      failed_when: false

    # ── Windows ────────────────────────────────────────────────────────────────
    # CONHOST FLASH MITIGATION: Every Ansible module call on a Windows host
    # over SSH spawns powershell.exe which flashes a console window on Win11.
    # Steady-state check cycle uses only 3 remote module calls:
    #   1. setup (fact gathering — unavoidable)
    #   2. win_command → wscript (hidden — no flash) — runs combined scan
    #   3. slurp — reads the single JSON result file
    # Config (exclusion list, WU flag) is passed as environment variables to
    # the scan script which writes them to disk — no separate win_copy.
    # The helpers version check is done inside CombinedScan.ps1: it compares
    # PATCHPILOT_APP_VERSION to the on-disk stamp and reports needs_refresh
    # in the JSON.  If true, Ansible pushes new helpers and re-runs the scan.

    # ── Combined scan (single win_command — hidden via wscript) ────────────
    - name: Run Windows scan bundle via single hidden WScript launcher (Windows)
      win_command: 'wscript.exe //nologo //B C:\ProgramData\PatchPilot\PatchPilot-AnsibleHiddenLaunch.vbs C:\ProgramData\PatchPilot\PatchPilot-CombinedScan.ps1'
      environment:
        WINUPDATE_ENABLED: "{{ 'true' if winupdate_enabled | bool else 'false' }}"
        PP_WINGET_EXCLUDED_IDS: "{{ winget_excluded_ids }}"
        PATCHPILOT_APP_VERSION: "{{ lookup('env', 'PATCHPILOT_APP_VERSION') | default('unknown', true) }}"
      when: ansible_facts['os_family'] == "Windows"
      changed_when: false
      failed_when: false
      tags: ['always']

    - name: Read Windows scan bundle JSON (single slurp) (Windows)
      ansible.windows.slurp:
        src: C:/ProgramData/PatchPilot/ansible-scan-bundle.json
      register: scan_bundle_slurp
      when: ansible_facts['os_family'] == "Windows"
      failed_when: false
      tags: ['always']

    - name: Decode Windows scan bundle (Windows)
      set_fact:
        _scan_bundle: "{{ scan_bundle_slurp.content | b64decode | from_json }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - scan_bundle_slurp.content is defined
        - (scan_bundle_slurp.content | length) > 0
      ignore_errors: true
      tags: ['always']

    # ── Helper script sync (only when version changed) ─────────────────────
    - name: Copy PatchPilot Windows helper bundle when version changed (Windows)
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/windows-client/"
        dest: "C:/ProgramData/PatchPilot/"
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is defined
        - _scan_bundle.needs_refresh | default(false) | bool
      changed_when: false
      tags: ['always']

    - name: Write helper bundle version stamp after sync (Windows)
      ansible.windows.win_copy:
        content: "{{ lookup('env', 'PATCHPILOT_APP_VERSION') | default('unknown', true) }}\n"
        dest: C:/ProgramData/PatchPilot/.patchpilot_helpers_version
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is defined
        - _scan_bundle.needs_refresh | default(false) | bool
      changed_when: false
      tags: ['always']

    # Re-run scan after helper refresh so results use the new scripts
    - name: Re-run Windows scan after helper refresh (Windows)
      win_command: 'wscript.exe //nologo //B C:\ProgramData\PatchPilot\PatchPilot-AnsibleHiddenLaunch.vbs C:\ProgramData\PatchPilot\PatchPilot-CombinedScan.ps1'
      environment:
        WINUPDATE_ENABLED: "{{ 'true' if winupdate_enabled | bool else 'false' }}"
        PP_WINGET_EXCLUDED_IDS: "{{ winget_excluded_ids }}"
        PATCHPILOT_APP_VERSION: "{{ lookup('env', 'PATCHPILOT_APP_VERSION') | default('unknown', true) }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is defined
        - _scan_bundle.needs_refresh | default(false) | bool
      changed_when: false
      failed_when: false
      tags: ['always']

    - name: Re-read scan bundle after helper refresh (Windows)
      ansible.windows.slurp:
        src: C:/ProgramData/PatchPilot/ansible-scan-bundle.json
      register: scan_bundle_slurp
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is defined
        - _scan_bundle.needs_refresh | default(false) | bool
      failed_when: false
      tags: ['always']

    - name: Re-decode scan bundle after helper refresh (Windows)
      set_fact:
        _scan_bundle: "{{ scan_bundle_slurp.content | b64decode | from_json }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is defined
        - _scan_bundle.needs_refresh | default(false) | bool
        - scan_bundle_slurp.content is defined
        - (scan_bundle_slurp.content | length) > 0
      ignore_errors: true
      tags: ['always']

    # ── First-run bootstrap: no scan bundle exists yet ─────────────────────
    # On first ever check (fresh Windows host), there's no bundle JSON and
    # no helper scripts.  Force a helper sync + scan.
    - name: Bootstrap Windows helpers on first run (Windows)
      ansible.windows.win_copy:
        src: "{{ playbook_dir }}/windows-client/"
        dest: "C:/ProgramData/PatchPilot/"
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is not defined
      changed_when: false
      tags: ['always']

    - name: Write version stamp on first run (Windows)
      ansible.windows.win_copy:
        content: "{{ lookup('env', 'PATCHPILOT_APP_VERSION') | default('unknown', true) }}\n"
        dest: C:/ProgramData/PatchPilot/.patchpilot_helpers_version
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is not defined
      changed_when: false
      tags: ['always']

    - name: Run initial scan on first run (Windows)
      win_command: 'wscript.exe //nologo //B C:\ProgramData\PatchPilot\PatchPilot-AnsibleHiddenLaunch.vbs C:\ProgramData\PatchPilot\PatchPilot-CombinedScan.ps1'
      environment:
        WINUPDATE_ENABLED: "{{ 'true' if winupdate_enabled | bool else 'false' }}"
        PP_WINGET_EXCLUDED_IDS: "{{ winget_excluded_ids }}"
        PATCHPILOT_APP_VERSION: "{{ lookup('env', 'PATCHPILOT_APP_VERSION') | default('unknown', true) }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is not defined
      changed_when: false
      failed_when: false
      tags: ['always']

    - name: Read scan bundle on first run (Windows)
      ansible.windows.slurp:
        src: C:/ProgramData/PatchPilot/ansible-scan-bundle.json
      register: scan_bundle_slurp
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is not defined
      failed_when: false
      tags: ['always']

    - name: Decode scan bundle on first run (Windows)
      set_fact:
        _scan_bundle: "{{ scan_bundle_slurp.content | b64decode | from_json }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is not defined
        - scan_bundle_slurp.content is defined
        - (scan_bundle_slurp.content | length) > 0
      ignore_errors: true
      tags: ['always']

    - name: Build winget_updates from bundle (Windows)
      set_fact:
        winget_updates:
          stdout: "{{ _scan_bundle.winget | default('') }}"
          stdout_lines: "{{ (_scan_bundle.winget | default('')).splitlines() }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - _scan_bundle is defined
        - _scan_bundle.winget is defined
        - (_scan_bundle.winget | default('') | length) > 0

    - name: Fallback winget_updates when bundle missing or empty (Windows)
      set_fact:
        winget_updates:
          stdout: "NO_UPDATES"
          stdout_lines: ["NO_UPDATES", "WINGET_ORCHESTRATOR_OR_SLURP_FAILED"]
      when:
        - ansible_facts['os_family'] == "Windows"
        - winget_updates is not defined

    - name: Build winupdate_updates from bundle (Windows)
      set_fact:
        winupdate_updates:
          stdout: "{{ _scan_bundle.winupdate | default('') }}"
          stdout_lines: "{{ (_scan_bundle.winupdate | default('')).splitlines() }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - winupdate_enabled | bool
        - _scan_bundle is defined
        - _scan_bundle.winupdate is defined
        - (_scan_bundle.winupdate | default('') | length) > 0

    - name: Fallback winupdate_updates when orchestrator or bundle failed (Windows)
      set_fact:
        winupdate_updates:
          stdout: "NO_UPDATES"
          stdout_lines: ["NO_UPDATES", "WINUPDATE_ORCHESTRATOR_OR_SLURP_FAILED"]
      when:
        - ansible_facts['os_family'] == "Windows"
        - winupdate_enabled | bool
        - winupdate_updates is not defined

    - name: Skip Windows Update check (disabled)
      debug:
        msg: "Windows Update check skipped on {{ inventory_hostname }} -- winupdate_enabled=false. Enable in Settings > General > Windows."
      when:
        - ansible_facts['os_family'] == "Windows"
        - not (winupdate_enabled | bool)

    # ── Emit package details ───────────────────────────────────────────────────
    - name: Emit Debian package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ apt_updates.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Debian" and apt_updates.stdout_lines is defined and apt_updates.stdout_lines | length > 0

    - name: Emit Homebrew package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ brew_updates.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Darwin" and brew_updates.stdout_lines is defined and brew_updates.stdout_lines | length > 0

    - name: Emit macOS system update details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ macos_updates.stdout_lines | default([]) }}"
      when: ansible_facts['os_family'] == "Darwin" and macos_updates.stdout_lines is defined and macos_updates.stdout_lines | length > 0

    - name: Emit App Store package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ mas_updates.stdout_lines | default([]) }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_updates is defined
        - mas_updates.stdout_lines is defined
        - mas_updates.stdout_lines | length > 0

    - name: Emit winget package details (Windows)
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ winget_updates.stdout_lines | default([]) }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - winget_updates is defined
        - winget_updates.stdout_lines is defined
        - winget_updates.stdout_lines | length > 0
        - winget_updates.stdout_lines[0] != "NO_UPDATES"

    - name: Emit Windows Update package details (Windows)
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ winupdate_updates.stdout_lines | default([]) }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - winupdate_enabled | bool
        - winupdate_updates is defined
        - winupdate_updates.stdout_lines is defined
        - winupdate_updates.stdout_lines | length > 0
        - winupdate_updates.stdout_lines[0] != "NO_UPDATES"

    # ── Status ─────────────────────────────────────────────────────────────────
    - name: Show update status
      debug:
        msg: >-
          {{ inventory_hostname }}:
          {% if apt_updates.stdout_lines is defined and apt_updates.stdout_lines | length > 0 %}
            {{ apt_updates.stdout_lines | length }} apt updates available
          {% elif brew_updates.stdout_lines is defined and brew_updates.stdout_lines | length > 0 %}
            {{ brew_updates.stdout_lines | length }} brew updates available
          {% elif macos_updates.stdout is defined and 'No new software available' not in macos_updates.stdout %}
            macOS system updates available
          {% elif mas_updates is defined and mas_updates.stdout_lines is defined and mas_updates.stdout_lines | length > 0 %}
            {{ mas_updates.stdout_lines | length }} App Store updates available
          {% elif (winget_updates is defined and winget_updates.stdout_lines is defined and winget_updates.stdout_lines | length > 0 and winget_updates.stdout_lines[0] != "NO_UPDATES") or (winupdate_updates is defined and winupdate_updates.stdout_lines is defined and winupdate_updates.stdout_lines | length > 0 and winupdate_updates.stdout_lines[0] != "NO_UPDATES") %}
            {% set winget_count = (winget_updates.stdout_lines | length) if (winget_updates is defined and winget_updates.stdout_lines is defined and winget_updates.stdout_lines | length > 0 and winget_updates.stdout_lines[0] != "NO_UPDATES") else 0 %}
            {% set winupdate_count = (winupdate_updates.stdout_lines | length) if (winupdate_updates is defined and winupdate_updates.stdout_lines is defined and winupdate_updates.stdout_lines | length > 0 and winupdate_updates.stdout_lines[0] != "NO_UPDATES") else 0 %}
            {{ winget_count + winupdate_count }} Windows updates available
          {% else %}
            Up to date
          {% endif %}
      when: apt_updates.stdout_lines is defined or brew_updates.stdout_lines is defined or macos_updates.stdout is defined or (mas_updates is defined and mas_updates.stdout_lines is defined) or (winget_updates is defined and winget_updates.stdout_lines is defined) or (winupdate_updates is defined and winupdate_updates.stdout_lines is defined)

    # =========================================================================
    # APPLY UPDATES  (--tags apply-updates)
    # =========================================================================
    - name: Starting updates on host
      debug:
        msg: "=== Applying updates to {{ inventory_hostname }} ==="
      tags: ['never', 'apply-updates']

    - name: Refresh apt cache before patching (Debian/Ubuntu)
      shell: apt-get update -qq 2>/dev/null
      become: yes
      when: ansible_facts['os_family'] == "Debian"
      changed_when: false
      failed_when: false
      tags: ['never', 'apply-updates']

    - name: Apply updates (Debian/Ubuntu)
      shell: |
        DEBIAN_FRONTEND=noninteractive apt-get -y \
          -o APT::Get::Always-Include-Phased-Updates=true \
          -o Dpkg::Options::="--force-confdef" \
          -o Dpkg::Options::="--force-confold" \
          dist-upgrade
      become: yes
      when: ansible_facts['os_family'] == "Debian"
      register: apt_upgrade_result
      changed_when: "'0 upgraded' not in apt_upgrade_result.stdout"
      tags: ['never', 'apply-updates']

    - name: Apply Homebrew updates (macOS)
      shell: |
        HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_EMOJI=1 \
        {{ brew_bin_path }} upgrade
      when: ansible_facts['os_family'] == "Darwin"
      register: brew_upgrade_result
      failed_when: false
      # Without this, every shell run reports `changed:` even when brew installed
      # nothing — which made `_detect_hosts_actually_patched` falsely flag the host
      # as patched and recorded an empty packages_updated list in patch_history.
      changed_when: "'==> Upgrading' in (brew_upgrade_result.stdout | default(''))"
      tags: ['never', 'apply-updates']

    - name: Apply macOS system updates (non-control nodes — per-label with exclusions)
      shell: |
        set -euo pipefail
        EXCLUDED="{{ macos_system_excluded_labels }}"

        # Collect all available softwareupdate labels
        LABELS=$(/usr/sbin/softwareupdate -l 2>&1 | awk '/^\* Label:/{sub(/^\* Label: /, ""); print}')

        if [ -z "$LABELS" ]; then
          echo "No macOS system updates available"
          exit 0
        fi

        installed_count=0
        skipped_count=0

        while IFS= read -r label; do
          [ -z "$label" ] && continue

          should_exclude=false
          if [ -n "$EXCLUDED" ]; then
            IFS=',' read -ra EXCL_LIST <<< "$EXCLUDED"
            for excl in "${EXCL_LIST[@]}"; do
              excl_trim=$(echo "$excl" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              [ -z "$excl_trim" ] && continue
              # Prefix match: "Command Line Tools for Xcode" matches "Command Line Tools for Xcode-26.4"
              if [[ "$label" == "$excl_trim"* ]]; then
                should_exclude=true
                break
              fi
            done
          fi

          if [ "$should_exclude" = true ]; then
            echo "SKIP [excluded]: $label"
            skipped_count=$((skipped_count + 1))
          else
            echo "Installing: $label"
            /usr/sbin/softwareupdate -i "$label" --agree-to-license || true
            installed_count=$((installed_count + 1))
          fi
        done <<< "$LABELS"

        echo "macOS system updates complete: $installed_count installed, $skipped_count skipped"
      become: yes
      when:
        - ansible_facts['os_family'] == "Darwin"
        - macos_system_updates_enabled | bool
        - not (is_control_node | default(false) | bool)
      register: macos_upgrade_result
      # Only "changed" when at least one Installing line was emitted by the script —
      # avoids false-positive patched flag when every label was excluded or none existed.
      changed_when: "'Installing: ' in (macos_upgrade_result.stdout | default(''))"
      tags: ['never', 'apply-updates']

    - name: Skip macOS system updates (disabled in settings)
      debug:
        msg: >-
          macOS system updates skipped on {{ inventory_hostname }}
          (macos_system_updates_enabled=false). Enable in PatchPilot Settings → macOS.
      when:
        - ansible_facts['os_family'] == "Darwin"
        - not (macos_system_updates_enabled | bool)
      tags: ['never', 'apply-updates']

    - name: Download macOS system updates (control nodes only)
      shell: /usr/sbin/softwareupdate -d -a --agree-to-license
      become: yes
      when:
        - ansible_facts['os_family'] == "Darwin"
        - macos_system_updates_enabled | bool
        - is_control_node | default(false) | bool
      register: macos_download_result
      tags: ['never', 'apply-updates']

    - name: Notify control node user about pending macOS updates
      debug:
        msg: "macOS system updates have been downloaded. Please install manually via System Settings and reboot when ready."
      when:
        - ansible_facts['os_family'] == "Darwin"
        - macos_system_updates_enabled | bool
        - is_control_node | default(false) | bool
        - macos_download_result is defined
        - macos_download_result.changed | default(false)
      tags: ['never', 'apply-updates']

    # ── App Store updates ──────────────────────────────────────────────────────
    # How this avoids hanging:
    #
    # 1. mas_enabled=true is required — opt-in because headless mas is fragile.
    #
    # 2. async + poll: Ansible runs the script detached on the remote Mac and
    #    polls every 30s, emitting "ASYNC POLL" lines. PatchPilot forwards these
    #    as ⏳ heartbeats so the UI stays alive during silent downloads.
    #    NOTE: the shell script's stdout (Updating..., DONE, etc.) is only
    #    visible when the task finishes — not line-by-line during download.
    #    That's a limitation of Ansible async, not a bug.
    #
    # 3. Per-app hard timeout: uses `timeout` (/usr/bin/timeout, macOS 12.3+)
    #    or `gtimeout` (brew install coreutils) to kill a hung mas process on
    #    the REMOTE HOST. Ansible's async timeout only fires on the control
    #    node — without this the mas process keeps running on the Mac forever.
    #    If neither timeout binary is found, mas runs without a hard kill
    #    but async/poll still bounds the Ansible-side wait.
    #
    - name: Apply App Store updates (macOS)
      shell: |
        MAS="{{ mas_bin_path }}"
        EXCLUDE="{{ mas_excluded_ids }}"
        PER_APP_TIMEOUT="{{ mas_per_app_timeout }}"
        TIMEOUT_CMD="{{ timeout_bin_path | default('') }}"

        # Wrapper: use timeout binary if available, otherwise run bare.
        run_mas_upgrade() {
          APP_ID="$1"
          if [ -n "$TIMEOUT_CMD" ]; then
            "$TIMEOUT_CMD" "$PER_APP_TIMEOUT" "$MAS" upgrade "$APP_ID" 2>&1
          else
            "$MAS" upgrade "$APP_ID" 2>&1
          fi
        }

        OUTDATED=$("$MAS" outdated 2>/dev/null | awk '{print $1}')
        if [ -z "$OUTDATED" ]; then
          echo "No App Store updates pending."
          exit 0
        fi

        TOTAL=$(echo "$OUTDATED" | wc -w | tr -d ' ')
        echo "App Store: $TOTAL update(s) to process."

        UPDATED=0; SKIPPED=0; TIMEDOUT=0; ERRORED=0
        for APP_ID in $OUTDATED; do
          # Look up app name
          APP_NAME=$("$MAS" outdated 2>/dev/null | awk -v id="$APP_ID" '$1==id {$1=""; sub(/^ /,""); print}')

          # Check exclusion list
          SKIP=false
          for EXC in $(echo "$EXCLUDE" | tr ',' '\n'); do
            EXC=$(echo "$EXC" | tr -d ' ')
            [ "$APP_ID" = "$EXC" ] && [ -n "$EXC" ] && SKIP=true && break
          done

          if $SKIP; then
            echo "SKIP [$APP_ID] $APP_NAME (excluded)"
            SKIPPED=$((SKIPPED+1))
            continue
          fi

          echo "START [$APP_ID] $APP_NAME"
          run_mas_upgrade "$APP_ID"
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "DONE [$APP_ID] $APP_NAME"
            UPDATED=$((UPDATED+1))
          elif [ $RC -eq 124 ]; then
            echo "TIMEOUT [$APP_ID] $APP_NAME exceeded ${PER_APP_TIMEOUT}s"
            TIMEDOUT=$((TIMEDOUT+1))
          else
            echo "ERROR [$APP_ID] $APP_NAME (exit $RC)"
            ERRORED=$((ERRORED+1))
          fi
        done

        echo "SUMMARY: updated=$UPDATED skipped=$SKIPPED timedout=$TIMEDOUT errored=$ERRORED"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_bin_path is defined
        - mas_bin_path | default('') != ""
        - mas_enabled | bool
      register: mas_upgrade_result
      failed_when: false
      async: "{{ mas_timeout_seconds }}"
      poll: 30
      tags: ['never', 'apply-updates']

    - name: Show App Store update results
      debug:
        msg: "{{ mas_upgrade_result.stdout_lines | default(['(no output)']) | join(' | ') }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_upgrade_result is defined
        - mas_upgrade_result is not skipped
        - mas_upgrade_result.stdout is defined
        - mas_upgrade_result.stdout | length > 0
      tags: ['never', 'apply-updates']

    - name: Skip App Store updates (mas disabled or not installed)
      debug:
        msg: >-
          App Store updates skipped on {{ inventory_hostname }} —
          {% if mas_bin_path is not defined or mas_bin_path | default('') == "" %}
          mas not installed. Run: brew install mas
          {% else %}
          mas_enabled=false. Enable in PatchPilot Settings → macOS.
          {% endif %}
      when:
        - ansible_facts['os_family'] == "Darwin"
        - (mas_bin_path is not defined or mas_bin_path | default('') == "") or not mas_enabled
      tags: ['never', 'apply-updates']

    # ── Windows: Apply winget updates ──────────────────────────────────────────
    # Reuse the PP-WingetCheck scheduled task (which already has stored user
    # credentials) by temporarily swapping its action to run winget upgrade.
    # After the apply completes, restore the original check action.
    - name: Apply winget updates (Windows)
      win_command: 'wscript.exe //nologo //B C:\ProgramData\PatchPilot\PatchPilot-AnsibleHiddenLaunch.vbs C:\ProgramData\PatchPilot\PatchPilot-WingetApply.ps1'
      register: winget_upgrade_result
      when: ansible_facts['os_family'] == "Windows"
      failed_when: false
      async: 2100
      poll: 30
      tags: ['never', 'apply-updates']

    - name: Show winget update results (Windows)
      debug:
        msg: "{{ winget_upgrade_result.stdout_lines | default(['(no output)']) | join(' | ') }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - winget_upgrade_result is defined
        - winget_upgrade_result is not skipped
        - winget_upgrade_result.stdout is defined
        - winget_upgrade_result.stdout | length > 0
      tags: ['never', 'apply-updates']

    # ── Windows: Apply Windows Updates (PSWindowsUpdate) ────────────────────────
    - name: Apply Windows Updates (Windows)
      win_command: 'wscript.exe //nologo //B C:\ProgramData\PatchPilot\PatchPilot-AnsibleHiddenLaunch.vbs C:\ProgramData\PatchPilot\PatchPilot-WinUpdateApply.ps1'
      register: winupdate_upgrade_result
      when:
        - ansible_facts['os_family'] == "Windows"
        - winupdate_enabled | bool
      failed_when: false
      async: 4200
      poll: 30
      tags: ['never', 'apply-updates']

    - name: Show Windows Update results (Windows)
      debug:
        msg: "{{ winupdate_upgrade_result.stdout_lines | default(['(no output)']) | join(' | ') }}"
      when:
        - ansible_facts['os_family'] == "Windows"
        - winupdate_enabled | bool
        - winupdate_upgrade_result is defined
        - winupdate_upgrade_result is not skipped
        - winupdate_upgrade_result.stdout is defined
        - winupdate_upgrade_result.stdout | length > 0
      tags: ['never', 'apply-updates']

    - name: Skip Windows Updates (disabled)
      debug:
        msg: "Windows Update apply skipped on {{ inventory_hostname }} -- winupdate_enabled=false."
      when:
        - ansible_facts['os_family'] == "Windows"
        - not (winupdate_enabled | bool)
      tags: ['never', 'apply-updates']

    # ── Reboot handling ────────────────────────────────────────────────────────
    - name: Check if reboot required (Linux)
      stat:
        path: /var/run/reboot-required
      become: yes
      register: reboot_required
      when: ansible_facts['os_family'] == "Debian"
      tags: ['never', 'apply-updates']

    - name: Reboot if needed (Linux)
      reboot:
        msg: "Rebooting for system updates"
        reboot_timeout: 300
      become: yes
      when:
        - ansible_facts['os_family'] == "Debian"
        - reboot_required.stat.exists
        - allow_auto_reboot | default(false) | bool
      tags: ['never', 'apply-updates', 'reboot']

    - name: Reboot skipped - auto-reboot disabled (Linux)
      debug:
        msg: "REBOOT_REQUIRED: {{ inventory_hostname }} needs a reboot but allow_auto_reboot is disabled."
      when:
        - ansible_facts['os_family'] == "Debian"
        - reboot_required.stat.exists
        - not (allow_auto_reboot | default(false) | bool)
      tags: ['never', 'apply-updates']

    # ── Windows reboot handling ─────────────────────────────────────────────
    - name: Check if reboot required (Windows)
      win_command: 'wscript.exe //nologo //B C:\ProgramData\PatchPilot\PatchPilot-AnsibleHiddenLaunch.vbs C:\ProgramData\PatchPilot\PatchPilot-RebootDetect.ps1'
      register: win_reboot_check
      when: ansible_facts['os_family'] == "Windows"
      changed_when: false
      failed_when: false
      tags: ['never', 'apply-updates']

    - name: Set Windows reboot fact
      set_fact:
        win_reboot_needed: "{{ win_reboot_check.stdout | default('') | trim == 'REBOOT_REQUIRED' }}"
      when: ansible_facts['os_family'] == "Windows"
      tags: ['never', 'apply-updates']

    - name: Reboot if needed (Windows)
      win_reboot:
        msg: "PatchPilot: Rebooting for updates"
        reboot_timeout: 600
      when:
        - ansible_facts['os_family'] == "Windows"
        - win_reboot_needed | default(false) | bool
        - allow_auto_reboot | default(false) | bool
      tags: ['never', 'apply-updates', 'reboot']

    - name: Reboot skipped - auto-reboot disabled (Windows)
      debug:
        msg: "REBOOT_REQUIRED: {{ inventory_hostname }} needs a reboot but allow_auto_reboot is disabled."
      when:
        - ansible_facts['os_family'] == "Windows"
        - win_reboot_needed | default(false) | bool
        - not (allow_auto_reboot | default(false) | bool)
      tags: ['never', 'apply-updates']
