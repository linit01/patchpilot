---
- hosts: all
  gather_facts: yes
  
  tasks:
    - name: Output host facts
      debug:
        msg: "HOSTINFO: {{ inventory_hostname }} | IP: {{ ansible_default_ipv4.address | default('N/A') }} | OS: {{ ansible_distribution | default('Unknown') }} | Family: {{ ansible_os_family }}"
    
    - name: Check for updates (Debian/Ubuntu)
      shell: "apt list --upgradable 2>/dev/null | tail -n +2"
      register: apt_updates
      when: ansible_facts['os_family'] == "Debian"
      changed_when: false
    
    - name: Output apt package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ apt_updates.stdout_lines }}"
      when: 
        - ansible_facts['os_family'] == "Debian"
        - apt_updates.stdout_lines | length > 0
      
    - name: Check for Homebrew updates (macOS)
      shell: "HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_EMOJI=1 /opt/homebrew/bin/brew outdated --verbose"
      register: brew_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false
    
    - name: Output brew package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ brew_updates.stdout_lines }}"
      when: 
        - ansible_facts['os_family'] == "Darwin"
        - brew_updates.stdout_lines | default([]) | length > 0
      
    - name: Check for macOS system updates
      shell: "/usr/sbin/softwareupdate -l"
      register: macos_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false
      
    - name: Output macOS system update details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ macos_updates.stdout_lines | default([]) | select('match', '^\\*') | list }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - macos_updates.stdout_lines | default([]) | select('match', '^\\*') | list | length > 0

    - name: Check if reboot required (Linux)
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_facts['os_family'] == "Debian"
      tags: [apply-updates]

    - name: Reboot if required and allowed
      reboot:
        msg: "Rebooting to complete updates"
        pre_reboot_delay: 5
        post_reboot_delay: 30
        reboot_timeout: 300
      when:
        - ansible_facts['os_family'] == "Debian"
        - reboot_required.stat.exists
        - allow_auto_reboot | default(false)
        - not is_control_node | default(false)
      become: yes
      tags: [apply-updates]
    
    - name: Show update status
      debug:
        msg: >-
          {% if ansible_facts['os_family'] == "Debian" %}
          {{ inventory_hostname }}: {% if apt_updates.stdout_lines | length > 0 %}{{ apt_updates.stdout_lines | length }} apt updates available{% else %}Up to date{% endif %}
          {% elif ansible_facts['os_family'] == "Darwin" %}
          {{ inventory_hostname }}: {% set brew_count = brew_updates.stdout_lines | default([]) | length %}{% set macos_count = macos_updates.stdout_lines | default([]) | select('match', '^\\*') | list | length %}{% set total = brew_count + macos_count %}{% if total > 0 %}{{ total }} updates available ({{ brew_count }} brew{% if macos_count > 0 %}, {{ macos_count }} system{% endif %}){% else %}Up to date{% endif %}
          {% endif %}

- hosts: all
  gather_facts: no
  tags: [apply-updates, never]
  tasks:
    - name: Apply updates (Debian/Ubuntu)
      shell: |
        export APT_GET_ASSUME_YES=yes
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get -o APT::Get::Always-Include-Phased-Updates=true dist-upgrade -y </dev/null
      when: ansible_facts['os_family'] == "Debian"
      become: yes
      register: apt_upgrade_result
      changed_when: "'0 upgraded' not in apt_upgrade_result.stdout"
      
    - name: Apply Homebrew updates (macOS)
      shell: "/opt/homebrew/bin/brew upgrade"
      when: ansible_facts['os_family'] == "Darwin"
      register: brew_upgrade_result
      changed_when: "'Already up-to-date' not in brew_upgrade_result.stdout"

    - name: Apply macOS system updates (non-control nodes with auto-reboot)
      shell: "/usr/sbin/softwareupdate -iaR --agree-to-license"
      become: yes
      when:
        - ansible_facts['os_family'] == "Darwin"
        - allow_auto_reboot | default(false) | bool
        - not is_control_node | default(false) | bool
      register: macos_upgrade_result
      tags: [apply-updates]

    - name: Download macOS system updates (control nodes only)
      shell: "/usr/sbin/softwareupdate -d -a"
      become: yes
      when:
        - ansible_facts['os_family'] == "Darwin"
        - is_control_node | default(false) | bool
      register: macos_download_result
      async: 3600
      poll: 30
      tags: [apply-updates]

    - name: Notify control node user about pending macOS updates
      debug:
        msg: "⚠️ macOS updates downloaded to control node {{ inventory_hostname }}. Please restart manually to complete installation."
      when:
        - ansible_facts['os_family'] == "Darwin"
        - is_control_node | default(false) | bool
        - macos_download_result.changed
