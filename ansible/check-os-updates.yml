---
- hosts: all
  gather_facts: yes
  
  tasks:
    - name: Output host facts
      debug:
        msg: "HOSTINFO: {{ inventory_hostname }} | IP: {{ ansible_default_ipv4.address | default('N/A') }} | OS: {{ ansible_distribution | default('Unknown') }} | Family: {{ ansible_os_family }}"
    
    - name: Check for updates (Debian/Ubuntu)
      shell: "apt list --upgradable 2>/dev/null | tail -n +2"
      register: apt_updates
      when: ansible_facts['os_family'] == "Debian"
      changed_when: false
    
    - name: Output apt package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ apt_updates.stdout_lines }}"
      when: 
        - ansible_facts['os_family'] == "Debian"
        - apt_updates.stdout_lines | length > 0
      
    - name: Check for Homebrew updates (macOS)
      shell: "HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_EMOJI=1 /opt/homebrew/bin/brew outdated --verbose"
      register: brew_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false
    
    - name: Output brew package details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ brew_updates.stdout_lines }}"
      when: 
        - ansible_facts['os_family'] == "Darwin"
        - brew_updates.stdout_lines | default([]) | length > 0
      
    - name: Check for macOS system updates
      shell: "/usr/sbin/softwareupdate -l"
      register: macos_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false
      
    - name: Check for App Store updates (requires mas)
      shell: "/opt/homebrew/bin/mas outdated"
      register: mas_updates
      when: ansible_facts['os_family'] == "Darwin"
      changed_when: false
      failed_when: false

    - name: Output macOS system update details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ macos_updates.stdout_lines }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - macos_updates.stdout_lines | default([]) | length > 0
        - "'* ' in item or 'Label:' in item"

    - name: Output App Store update details
      debug:
        msg: "PACKAGE: {{ inventory_hostname }} | {{ item }}"
      loop: "{{ mas_updates.stdout_lines }}"
      when:
        - ansible_facts['os_family'] == "Darwin"
        - mas_updates.stdout_lines | default([]) | length > 0
    
    - name: Check if reboot required (Linux)
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_facts['os_family'] == "Debian"
      tags: [apply-updates]

    - name: Reboot if required and allowed
      reboot:
        msg: "Rebooting to complete updates"
        pre_reboot_delay: 5
        post_reboot_delay: 30
        reboot_timeout: 300
      when:
        - ansible_facts['os_family'] == "Debian"
        - reboot_required.stat.exists
        - allow_auto_reboot | default(false)
        - not is_control_node | default(false)
      become: yes
      tags: [apply-updates]
    
    - name: Show update status
      debug:
        msg: >-
          {% if ansible_facts['os_family'] == "Debian" %}
          {{ inventory_hostname }}: {% if apt_updates.stdout_lines | length > 0 %}{{ apt_updates.stdout_lines | length }} apt updates available{% else %}Up to date{% endif %}
          {% elif ansible_facts['os_family'] == "Darwin" %}
          {{ inventory_hostname }}: {% if brew_updates.stdout_lines | default([]) | length > 0 %}{{ brew_updates.stdout_lines | length }} brew updates available{% else %}Up to date{% endif %}
          {% endif %}

- hosts: all
  gather_facts: no
  tags: [apply-updates, never]
  tasks:
    - name: Apply updates (Debian/Ubuntu)
      shell: |
        export APT_GET_ASSUME_YES=yes
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get -o APT::Get::Always-Include-Phased-Updates=true dist-upgrade -y
      when: ansible_facts['os_family'] == "Debian"
      become: yes
      register: apt_upgrade_result
      changed_when: "'0 upgraded' not in apt_upgrade_result.stdout"
      become: yes
      
    - name: Apply Homebrew updates (macOS)
      shell: "/opt/homebrew/bin/brew upgrade"
      when: ansible_facts['os_family'] == "Darwin"
      register: brew_upgrade_result
      changed_when: "'Already up-to-date' not in brew_upgrade_result.stdout"
