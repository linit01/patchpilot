---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — Named PersistentVolumes
# Generated by install-k3s.sh
#
# Static PVs are used instead of dynamic provisioning so that PV names are
# human-readable (patchpilot-postgres-data, etc.) rather than pvc-<uuid>.
# Each PV has a claimRef that pre-binds it to the matching PVC — no other
# workload can claim these volumes.
#
# Reclaim policy is Delete — PVs are automatically removed when PVCs are deleted.
# Data is protected by automated daily backups (Settings → Backup & Restore).
# ─────────────────────────────────────────────────────────────────────────────

# PostgreSQL data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: patchpilot-postgres-data
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: postgres
    app.kubernetes.io/managed-by: patchpilot-installer
spec:
  capacity:
    storage: ${PP_POSTGRES_STORAGE_SIZE}
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Delete
  storageClassName: ${PP_POSTGRES_STORAGE_CLASS}
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: postgres-data
    namespace: ${PP_NAMESPACE}
${PP_POSTGRES_PV_SOURCE}

# Backup archives
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: patchpilot-backups
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: backups
    app.kubernetes.io/managed-by: patchpilot-installer
spec:
  capacity:
    storage: ${PP_BACKUPS_STORAGE_SIZE}
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Delete
  storageClassName: ${PP_APP_STORAGE_CLASS}
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: patchpilot-backups
    namespace: ${PP_NAMESPACE}
${PP_APP_PV_SOURCE}

# Ansible playbooks / inventory
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: patchpilot-ansible-data
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: ansible
    app.kubernetes.io/managed-by: patchpilot-installer
spec:
  capacity:
    storage: ${PP_ANSIBLE_STORAGE_SIZE}
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Delete
  storageClassName: ${PP_APP_STORAGE_CLASS}
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: ansible-data
    namespace: ${PP_NAMESPACE}
${PP_APP_PV_SOURCE_ANSIBLE}
