---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot Secrets
# Generated by install-k3s.sh — do not edit manually unless you know what
# you are doing. Re-run the installer to regenerate.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: patchpilot-secrets
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # ── Database ──────────────────────────────────────────────────────────────
  POSTGRES_USER:     "${PP_DB_USER}"
  POSTGRES_PASSWORD: "${PP_DB_PASSWORD}"
  POSTGRES_DB:       "${PP_DB_NAME}"

  # ── Encryption (Fernet key for stored SSH secrets) ────────────────────────
  PATCHPILOT_ENCRYPTION_KEY: "${PP_ENCRYPTION_KEY}"

  # ── Network ───────────────────────────────────────────────────────────────
  APP_BASE_URL:    "${PP_BASE_URL}"
  ALLOWED_ORIGINS: "${PP_ALLOWED_ORIGINS}"
