---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patchpilot-postgres
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate          # Required for RWO volumes
  selector:
    matchLabels:
      app: patchpilot-postgres
  template:
    metadata:
      labels:
        app: patchpilot-postgres
        app.kubernetes.io/name: patchpilot
        app.kubernetes.io/component: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: patchpilot-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: patchpilot-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: patchpilot-secrets
              key: POSTGRES_DB
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "${PP_DB_USER}", "-d", "${PP_DB_NAME}"]
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "${PP_DB_USER}", "-d", "${PP_DB_NAME}"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: patchpilot-postgres-data

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: postgres
spec:
  selector:
    app: patchpilot-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  clusterIP: None           # Headless — backend connects by hostname within namespace
