---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — PersistentVolumeClaims
# Generated by install-k3s.sh
#
# volumeName pins each PVC to its named PV (defined in 02a-pvs.yaml).
# This ensures kubectl get pv shows patchpilot-* names, not pvc-<uuid>.
# ─────────────────────────────────────────────────────────────────────────────

# PostgreSQL data volume
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: patchpilot-postgres-data
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: postgres
spec:
  accessModes: [ReadWriteOnce]
  volumeName: patchpilot-postgres-data
  resources:
    requests:
      storage: ${PP_POSTGRES_STORAGE_SIZE}
  ${PP_POSTGRES_STORAGE_CLASS_SPEC}

# Backup archives volume
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: patchpilot-backups
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: backups
spec:
  accessModes: [ReadWriteOnce]
  volumeName: patchpilot-backups
  resources:
    requests:
      storage: ${PP_BACKUPS_STORAGE_SIZE}
  ${PP_APP_STORAGE_CLASS_SPEC}

# Ansible playbooks / inventory volume (local storage — small files, no NFS needed)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: patchpilot-ansible-data
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: ansible
spec:
  accessModes: [ReadWriteOnce]
  volumeName: patchpilot-ansible-data
  resources:
    requests:
      storage: ${PP_ANSIBLE_STORAGE_SIZE}
  ${PP_ANSIBLE_STORAGE_CLASS_SPEC}
