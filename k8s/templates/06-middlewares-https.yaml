---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — Traefik Middlewares
# Applied only when TLS is enabled (generated by install-k3s.sh).
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: patchpilot-https-redirect
  namespace: ${PP_NAMESPACE}
spec:
  redirectScheme:
    scheme: https
    permanent: true

# Security headers (HSTS + standard headers)
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: patchpilot-security-headers
  namespace: ${PP_NAMESPACE}
spec:
  headers:
    sslRedirect: true
    forceSTSHeader: true
    stsSeconds: 63072000            # 2 years
    stsIncludeSubdomains: true
    stsPreload: true
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: "strict-origin-when-cross-origin"
