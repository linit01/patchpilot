---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — Ingress (HTTPS / TLS)
# Generated by install-k3s.sh
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchpilot
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: ingress
  annotations:
    cert-manager.io/cluster-issuer: ${PP_CLUSTER_ISSUER}
    traefik.ingress.kubernetes.io/router.entrypoints: "web,websecure"
${PP_INGRESS_MIDDLEWARE_ANNOTATION}
spec:
  ingressClassName: ${PP_INGRESS_CLASS}
  tls:
  - hosts:
${PP_TLS_HOSTS}
    secretName: ${PP_TLS_SECRET_NAME}
  rules:
${PP_INGRESS_RULES}
