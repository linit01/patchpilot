---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — cert-manager Certificate
# Generated by install-k3s.sh based on install-config.yaml hostnames.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: patchpilot-tls
  namespace: ${PP_NAMESPACE}
spec:
  secretName: ${PP_TLS_SECRET_NAME}
  issuerRef:
    name: ${PP_CLUSTER_ISSUER}
    kind: ClusterIssuer
  dnsNames:
${PP_TLS_DNS_NAMES}
