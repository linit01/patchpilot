---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — Frontend (Nginx)
# Static assets are baked into the patchpilot-frontend image at build time.
#
# This ConfigMap supplies the nginx.conf TEMPLATE (nginx.conf.tmpl).
# At container startup, the entrypoint script runs envsubst to substitute
# $NGINX_BACKEND_HOST and writes the rendered config to default.conf.
#
# The NGINX_BACKEND_HOST env var in the Deployment (value: patchpilot-backend)
# is the canonical source of the backend service name for k8s.
# Docker Compose uses NGINX_BACKEND_HOST=backend (its service name).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: patchpilot-nginx-config
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: frontend
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index login.html;

        # ── Frontend SPA ─────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /login.html;
        }

        # ── Backend API ──────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://${NGINX_BACKEND_HOST}:8000/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── WebSocket (live patch progress) ──────────────────────────────────
        location /ws/ {
            proxy_pass            http://${NGINX_BACKEND_HOST}:8000/ws/;
            proxy_http_version    1.1;
            proxy_set_header      Upgrade    $http_upgrade;
            proxy_set_header      Connection "upgrade";
            proxy_set_header      Host       $host;
            proxy_set_header      X-Real-IP  $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    86400;
        }

        # ── Health endpoint ───────────────────────────────────────────────────
        location /nginx-health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patchpilot-frontend
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "${PP_VERSION}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patchpilot-frontend
  template:
    metadata:
      labels:
        app: patchpilot-frontend
        app.kubernetes.io/name: patchpilot
        app.kubernetes.io/component: frontend
    spec:
      imagePullSecrets:
      - name: ${PP_PULL_SECRET_NAME}
      containers:
      - name: frontend
        image: ${PP_FRONTEND_IMAGE}
        imagePullPolicy: ${PP_IMAGE_PULL_POLICY}
        env:
        - name: NGINX_BACKEND_HOST
          value: "patchpilot-backend"   # k8s Service name — rendered into nginx.conf at startup
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf.tmpl
          subPath: nginx.conf
        livenessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /nginx-health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: nginx-config
        configMap:
          name: patchpilot-nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: patchpilot-frontend
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: patchpilot-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
