---
# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — Ingress (HTTP only, no TLS)
# Generated by install-k3s.sh when tls.enabled: false
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: patchpilot
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
spec:
  ingressClassName: ${PP_INGRESS_CLASS}
  rules:
${PP_INGRESS_RULES}
