# ─────────────────────────────────────────────────────────────────────────────
# PatchPilot — RBAC
#
# The backend pod needs two levels of permission:
#
# Role (namespaced) — resources that live inside the patchpilot namespace:
#   secrets/patch      — patch PATCHPILOT_ENCRYPTION_KEY during restore
#   deployments        — scale down postgres/frontend/backend during uninstall & restore
#   pods               — list/watch for kubectl wait --for=delete during uninstall
#   jobs               — create/get/list/watch/delete the hostPath cleanup Job on uninstall
#
# ClusterRole (cluster-scoped) — resources that live outside any namespace:
#   namespaces/delete  — delete the patchpilot namespace on uninstall
#   persistentvolumes  — list/delete PVs on uninstall (Retain policy edge cases)
#   clusterissuers     — delete cert-manager ClusterIssuer on uninstall
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patchpilot-backend
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: patchpilot-installer
---
# ── Namespaced Role ───────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patchpilot-backend
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: patchpilot-installer
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["patchpilot-secrets"]
    verbs: ["get", "patch"]
  # Scale down all deployments during uninstall and backup/restore
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
  # Watch pods for kubectl wait --for=delete during uninstall
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patchpilot-backend
  namespace: ${PP_NAMESPACE}
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: patchpilot-installer
subjects:
  - kind: ServiceAccount
    name: patchpilot-backend
    namespace: ${PP_NAMESPACE}
roleRef:
  kind: Role
  name: patchpilot-backend
  apiGroup: rbac.authorization.k8s.io
---
# ── ClusterRole for cluster-scoped resources ─────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: patchpilot-backend
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: patchpilot-installer
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames: ["${PP_NAMESPACE}"]
    verbs: ["delete"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["list", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: patchpilot-backend
  labels:
    app.kubernetes.io/name: patchpilot
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: patchpilot-installer
subjects:
  - kind: ServiceAccount
    name: patchpilot-backend
    namespace: ${PP_NAMESPACE}
roleRef:
  kind: ClusterRole
  name: patchpilot-backend
  apiGroup: rbac.authorization.k8s.io
